# Shared security headers.
# nginx does NOT merge add_header directives across nesting levels: any
# location{} block that defines its own add_header discards all add_header
# set at the server{} level. So this snippet must be included in every
# location block, not just declared once at server level.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
