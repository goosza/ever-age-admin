server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — admin panel handles sensitive operations, so these
    # are enforced strictly (no third-party embeds, scripts, or framing).
    # NOTE: nginx does not merge add_header across nesting levels — any
    # location{} below that sets its own add_header must also include this
    # snippet, or it will silently drop these headers. See security-headers.conf.
    include /etc/nginx/conf.d/security-headers.conf;

    # Health check endpoint
    location /health {
        include /etc/nginx/conf.d/security-headers.conf;
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy API requests to backend
    location /api/ {
        include /etc/nginx/conf.d/security-headers.conf;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback - all routes go to index.html
    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
